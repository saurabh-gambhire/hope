databaseChangeLog:
  - changeSet:
      id: create-table-sub-organization
      author: saurabh-gambhire
      changes:
        - createTable:
            tableName: sub_organization
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: fiscal_year_start
                  type: DATE
              - column:
                  name: fiscal_year_end
                  type: DATE
              - column:
                  name: purchase_order_number
                  type: VARCHAR(100)
              - column:
                  name: contribution_type
                  type: VARCHAR(20)
              - column:
                  name: contribution_value
                  type: DECIMAL(12,2)
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: sub_organization
            baseColumnNames: organization_id
            referencedTableName: organization
            referencedColumnNames: id
            constraintName: fk_sub_org_organization

  - changeSet:
      id: create-table-sub-organization-contact
      author: saurabh-gambhire
      changes:
        - createTable:
            tableName: sub_organization_contact
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: sub_organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: office_phone
                  type: VARCHAR(50)
              - column:
                  name: extension
                  type: VARCHAR(20)
              - column:
                  name: phone_type
                  type: VARCHAR(20)
              - column:
                  name: additional_phone
                  type: VARCHAR(50)
              - column:
                  name: additional_extension
                  type: VARCHAR(20)
              - column:
                  name: additional_phone_type
                  type: VARCHAR(20)
              - column:
                  name: address_id
                  type: BIGINT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: sub_organization_contact
            baseColumnNames: sub_organization_id
            referencedTableName: sub_organization
            referencedColumnNames: id
            constraintName: fk_sub_org_contact_sub_org
        - addForeignKeyConstraint:
            baseTableName: sub_organization_contact
            baseColumnNames: address_id
            referencedTableName: address
            referencedColumnNames: id
            constraintName: fk_sub_org_contact_address

  - changeSet:
      id: create-table-sub-organization-location
      author: saurabh-gambhire
      changes:
        - createTable:
            tableName: sub_organization_location
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: sub_organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: address_id
                  type: BIGINT
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: sub_organization_location
            baseColumnNames: sub_organization_id
            referencedTableName: sub_organization
            referencedColumnNames: id
            constraintName: fk_sub_org_location_sub_org
        - addForeignKeyConstraint:
            baseTableName: sub_organization_location
            baseColumnNames: address_id
            referencedTableName: address
            referencedColumnNames: id
            constraintName: fk_sub_org_location_address
