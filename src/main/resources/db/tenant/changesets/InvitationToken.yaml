databaseChangeLog:
  - changeSet:
      id: create-table-invitation-token
      author: saurabh-gambhire
      changes:
        - createTable:
            tableName: invitation_token
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: token
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: add-fk-invitation-token-user
      author: saurabh-gambhire
      changes:
        - addForeignKeyConstraint:
            baseTableName: invitation_token
            baseColumnNames: user_id
            constraintName: fk_invitation_token_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
