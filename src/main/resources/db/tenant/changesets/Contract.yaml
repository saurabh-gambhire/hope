databaseChangeLog:
  - changeSet:
      id: create-table-contract
      author: saurabh-gambhire
      changes:
        - createTable:
            tableName: contract
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: identifier
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: contract_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: budget_amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: paid_amount
                  type: DECIMAL(12,2)
                  defaultValueNumeric: 0
              - column:
                  name: enrollment_type
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: is_template
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: source_contract_id
                  type: BIGINT
              - column:
                  name: organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: archive
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: modified_by
                  type: VARCHAR(255)
              - column:
                  name: created
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: contract
            baseColumnNames: organization_id
            referencedTableName: organization
            referencedColumnNames: id
            constraintName: fk_contract_organization
        - addForeignKeyConstraint:
            baseTableName: contract
            baseColumnNames: source_contract_id
            referencedTableName: contract
            referencedColumnNames: id
            constraintName: fk_contract_source_contract

