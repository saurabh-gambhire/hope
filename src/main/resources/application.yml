app:
  version: 1.0
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  default-user:
    email: ${DEFAULT_USER_EMAIL:admin@hopeehr.com}
    password: ${DEFAULT_USER_PASSWORD:Admin@123}
    first-name: ${DEFAULT_USER_FIRST_NAME:System}
    last-name: ${DEFAULT_USER_LAST_NAME:Admin}

server:
  port: 8083

spring:
  application:
    name: master-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/master_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ~
  liquibase:
    change-log: classpath:db/master.yaml
    enabled: true

tenant:
  schemas: ${TENANT_SCHEMAS:new_beginning,hope_programme}

keycloak:
  realm: master
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8090}
  auth-url: ${keycloak.base-url}/
  realm-url: ${keycloak.base-url}/realms/
  client-id: ${KEYCLOAK_CLIENT_ID:admin-cli}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  token:
    access_token_life_span: 3600
    sso_session_idle_timeout: 43200
    sso_session_max_lifespan: 86400
    offline_session_idle_timeout: 2592000
    offline_session_max_lifespan: 5184000
    client_session_idle_timeout: 86400
    client_session_max_lifespan: 172800

aws:
  access-key: ${AWS_ACCESS_KEY:abc}
  secret-key: ${AWS_SECRET_KEY:abc}
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:hope-ehr}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@hopeehr.com}
  template:
    invitation: ${SENDGRID_TEMPLATE_INVITATION}
    otp: ${SENDGRID_TEMPLATE_OTP}

invitation:
  token-expiry-hours: 72
  portal-link: ${PORTAL_LINK:http://localhost:5173}

otp:
  expiry-minutes: 15
  max-attempts: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /api-docs
  show-actuator: false
